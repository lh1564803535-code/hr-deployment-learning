version: '3.8'

services:
  # 前端服务（Nginx）
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: hr-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    environment:
      - BACKEND_URL=http://backend:8081
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端服务（Go API）
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hr-backend
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=secret123
      - DB_NAME=hrdb
      - LOG_LEVEL=info
      - PORT=8081
    volumes:
      - ./backend/logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 数据库服务（PostgreSQL）
  db:
    image: postgres:15-alpine
    container_name: hr-db
    networks:
      - app-network
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret123
      - POSTGRES_DB=hrdb
      - POSTGRES_INITDB_ARGS=-c log_statement=all
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

# 定义网络
networks:
  app-network:
    driver: bridge

# 定义数据卷
volumes:
  db-data:
    driver: local
